<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connecting Facebook...</title>
<style>
body{background:#0a0a0f;color:#e8e8f0;font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid #1e1e2e;border-top:3px solid #a855f7;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="spinner"></div>
<div>Connecting your Facebook account...</div>
<script>
// Get code and state from URL then forward to Railway
var params = new URLSearchParams(window.location.search);
var code  = params.get('code');
var state = params.get('state');
var error = params.get('error');

if(error) {
  window.location.href = '/dashboard.html?fb_error=cancelled';
} else if(code) {
  // Forward to Railway backend
  var railwayUrl = 'https://autopostleey-api-production.up.railway.app/facebook/callback'
    + '?code=' + encodeURIComponent(code)
    + '&state=' + encodeURIComponent(state || '');
  window.location.href = railwayUrl;
} else {
  window.location.href = '/dashboard.html?fb_error=no_code';
}
</script>
</body>
</html>
